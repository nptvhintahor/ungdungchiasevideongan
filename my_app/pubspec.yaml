name: my_app
description: "TikTok Clone Flutter LOCAL + SQLite"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🎬 VIDEO + PICKER
  image_picker: ^1.1.2
  video_player: ^2.9.5

  # 📁 LẤY ĐƯỜNG DẪN FILE
  path_provider: ^2.1.3

  # 💾 SQLITE
  sqflite: ^2.3.3
  path: ^1.9.0

  # 📝 LƯU THÔNG TIN NGƯỜI DÙNG
  shared_preferences: ^2.1.1

  # 🌐 HTTP (tải video)
  http: ^1.2.0

  # 🔐 XIN QUYỀN LƯU TRỮ
  permission_handler: ^11.3.1

  # 💬 WEBSOCKET (nhắn tin realtime)
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true